# GameForge Alembic configuration (contract §5, §12A.3).
#
# script_location is a path relative to the current working directory when
# alembic is invoked from the repo root (both the CLI path — `uv run alembic
# -c alembic.ini upgrade head` — and `migrations_api.py`, which additionally
# overrides both `script_location` and `sqlalchemy.url` with absolute paths /
# the caller's url, so this file's literal values are only what a bare CLI
# invocation from the repo root sees).

[alembic]
script_location = gameforge/runtime/persistence/migrations

# Prepend the current working directory to sys.path so `env.py` can
# `import gameforge...` when alembic is run as a standalone console script
# (its own sys.path[0] is the script's install location, not the repo root).
prepend_sys_path = .

path_separator = os

# Local default; overridden by migrations_api.py (test/CI path) or by
# gameforge.runtime.persistence.engine.resolve_url()'s DATABASE_URL env var.
sqlalchemy.url = sqlite:///gameforge.db


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
