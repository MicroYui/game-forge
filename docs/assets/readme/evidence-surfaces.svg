<svg width="1400" height="650" viewBox="0 0 1400 650" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="100" y1="30" x2="1320" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3F0E8"/>
      <stop offset="1" stop-color="#E8E5DC"/>
    </linearGradient>
    <filter id="paper" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#29312C" flood-opacity="0.11"/>
    </filter>
  </defs>
  <rect width="1400" height="650" rx="30" fill="url(#bg2)"/>
  <rect x="1" y="1" width="1398" height="648" rx="29" stroke="#D3CEC1" stroke-width="2"/>
  <path d="M70 139H1330" stroke="#CFC9BC"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'PingFang SC', sans-serif">
    <text x="70" y="76" fill="#18201C" font-size="36" font-weight="750">三个证据面，不混为一谈</text>
    <text x="70" y="112" fill="#657069" font-size="17">参考游戏、格式完整性与外部历史病例，分别回答不同问题。</text>
  </g>

  <g filter="url(#paper)">
    <rect x="70" y="180" width="394" height="388" rx="20" fill="#FBFAF6" stroke="#D7D2C6"/>
    <rect x="503" y="180" width="394" height="388" rx="20" fill="#FBFAF6" stroke="#D7D2C6"/>
    <rect x="936" y="180" width="394" height="388" rx="20" fill="#FBFAF6" stroke="#D7D2C6"/>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'PingFang SC', sans-serif">
    <circle cx="112" cy="224" r="20" fill="#DDEDE8"/>
    <path d="M104 226L110 232L121 215" stroke="#2F8075" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="146" y="230" fill="#1C2722" font-size="25" font-weight="750">Aureus</text>
    <text x="96" y="274" fill="#748078" font-size="12" font-weight="750" letter-spacing="1.1">RUNNABLE REFERENCE GAME</text>
    <text x="96" y="320" fill="#27322C" font-size="17" font-weight="650">真正执行了什么？</text>
    <text x="96" y="354" fill="#657069" font-size="15">任务 · 战斗 · 经济 · 抽卡</text>
    <text x="96" y="380" fill="#657069" font-size="15">由确定性内核驱动 Playtest</text>
    <rect x="96" y="423" width="342" height="92" rx="12" fill="#EDF6F3"/>
    <text x="114" y="454" fill="#2F8075" font-size="13" font-weight="700">证明范围</text>
    <text x="114" y="482" fill="#34433C" font-size="14">端到端执行与失败 → 修复 → 回归闭环</text>

    <circle cx="545" cy="224" r="20" fill="#F3E8CE"/>
    <path d="M535 224H555M545 214V234" stroke="#9B6A17" stroke-width="2.5" stroke-linecap="round"/>
    <text x="579" y="230" fill="#1C2722" font-size="25" font-weight="750">Flare</text>
    <text x="529" y="274" fill="#748078" font-size="12" font-weight="750" letter-spacing="1.1">ADAPTER INTEGRITY</text>
    <text x="529" y="320" fill="#27322C" font-size="17" font-weight="650">配置片段是否无损？</text>
    <text x="529" y="354" fill="#657069" font-size="15">真实配置片段解析 → Spec-IR</text>
    <text x="529" y="380" fill="#657069" font-size="15">再导出并逐字节 round-trip</text>
    <rect x="529" y="423" width="342" height="92" rx="12" fill="#F8F0DE"/>
    <text x="547" y="454" fill="#9B6A17" font-size="13" font-weight="700">诚实边界</text>
    <text x="547" y="482" fill="#4B4130" font-size="14">外部缺陷挖掘 = insufficient_evidence，不冒充有效性证明</text>

    <circle cx="978" cy="224" r="20" fill="#E4E8F6"/>
    <path d="M969 230L978 215L987 230H969Z" stroke="#546DAE" stroke-width="2.2" stroke-linejoin="round"/>
    <text x="1012" y="230" fill="#1C2722" font-size="25" font-weight="750">Endless Sky</text>
    <text x="962" y="274" fill="#748078" font-size="12" font-weight="750" letter-spacing="1.1">EXTERNAL HISTORICAL CASES</text>
    <text x="962" y="320" fill="#27322C" font-size="17" font-weight="650">外部历史缺陷能否进入流水线？</text>
    <text x="962" y="354" fill="#657069" font-size="15">8 个 qualified cases · 4 类缺陷</text>
    <text x="962" y="380" fill="#657069" font-size="15">development / verification 分离</text>
    <rect x="962" y="423" width="342" height="92" rx="12" fill="#EEF0F8"/>
    <text x="980" y="454" fill="#546DAE" font-size="13" font-weight="700">统计边界</text>
    <text x="980" y="482" fill="#3C455F" font-size="14">每类仅 1+1，当前状态 underpowered</text>
  </g>

  <text x="70" y="614" fill="#7C857F" font-size="13" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'PingFang SC', sans-serif">证据优先：负结论与样本不足同样保留在产品叙事中。</text>
</svg>
